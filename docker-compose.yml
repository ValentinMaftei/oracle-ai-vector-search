services:
  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-26ai
    ports:
      - "1522:1521"
    environment:
      - ORACLE_PWD=
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./all_MiniLM_L12_v2_augmented:/opt/oracle/models
volumes:
  oracle-data: